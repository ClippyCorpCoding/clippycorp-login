<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClippyCorp Login – Microsoft Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #020617;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 24px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.8);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 16px;
      font-size: 14px;
      color: #9ca3af;
    }
    .status {
      font-size: 13px;
      margin-bottom: 16px;
      color: #a5b4fc;
    }
    .status.error {
      color: #fca5a5;
    }
    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: #2563eb;
      color: #f9fafb;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .ms-logo {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      overflow: hidden;
    }
    .ms-logo span:nth-child(1) { background: #f25022; }
    .ms-logo span:nth-child(2) { background: #7fba00; }
    .ms-logo span:nth-child(3) { background: #00a4ef; }
    .ms-logo span:nth-child(4) { background: #ffb900; }
    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #6b7280;
    }
    .footer strong {
      color: #e5e7eb;
      font-weight: 500;
    }
  </style>

  <!-- MSAL.js (Microsoft Authentication Library for JavaScript) -->
  <script src="https://alcdn.msauth.net/browser/2.34.0/js/msal-browser.min.js"></script>
</head>
<body>
  <div class="card">
    <h1>ClippyCorp Auth Login</h1>
    <p>Sign in with your personal Microsoft account (Outlook / Hotmail / Live) to access the ClippyCorp database.</p>

    <div id="status" class="status">Ready to sign in.</div>

    <button id="ms-login">
      <span class="ms-logo">
        <span></span><span></span><span></span><span></span>
      </span>
      <span>Sign in with Microsoft</span>
    </button>

    <div class="footer">
      <strong>Note:</strong> <code>clippycorp@outlook.com</code> is a root bypass account and will be granted full access.
    </div>
  </div>
